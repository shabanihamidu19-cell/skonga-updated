name: Build Android APK

# Runs automatically every time you push code to the "main" branch.
# You can also trigger it manually from the GitHub Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java (needed by Gradle/Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icon + splash screen from resources/
        # @capacitor/assets is deliberately NOT in package.json (it pulls in
        # 'sharp', which has no prebuilt binaries for Termux/Android-arm and
        # breaks `npm install` on-device). npx fetches it fresh here instead —
        # this runner is ubuntu-latest, where sharp's prebuilts work fine.
        # --yes avoids an interactive "ok to install?" prompt.
        run: npx --yes @capacitor/assets generate --android

      - name: Sync Capacitor (copies www/ into the native Android project)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: skonga-ai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # ── SIGNED RELEASE BUILD ──────────────────────────────────────
      # Only runs once you've added the 4 secrets below in your repo:
      # Settings ▸ Secrets and variables ▸ Actions ▸ New repository secret
      #   ANDROID_KEYSTORE_BASE64   (your .jks/.keystore file, base64-encoded)
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      # See RELEASE-SIGNING.md for how to generate the keystore and
      # encode it. Until those secrets exist, this step is skipped
      # automatically and only the debug APK above is produced.
      - name: Check for release signing secrets
        id: has-signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        if: steps.has-signing.outputs.present == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build signed release APK
        if: steps.has-signing.outputs.present == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload signed release APK
        if: steps.has-signing.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: skonga-ai-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
